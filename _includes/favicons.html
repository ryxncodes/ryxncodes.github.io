{% capture favicon_path %}{{ '/assets/img/favicons' | relative_url }}{% endcapture %}

<link rel="icon" type="image/png" href="{{ favicon_path }}/favicon-96x96.png?v=rk1" sizes="96x96">
<link rel="icon" type="image/x-icon" href="{{ favicon_path }}/favicon.ico?v=rk1">
<link rel="shortcut icon" href="{{ favicon_path }}/favicon.ico?v=rk1">
<link rel="apple-touch-icon" sizes="180x180" href="{{ favicon_path }}/apple-touch-icon.png?v=rk1">
{% if site.pwa.enabled %}
  <link rel="manifest" href="{{ favicon_path }}/ryxn.webmanifest?v=rk1">
{% endif %}
